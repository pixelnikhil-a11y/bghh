name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create cpp directory
        run: mkdir -p app/src/main/cpp

      - name: Clone llama.cpp (with sparse checkout to save time)
        run: |
          cd app/src/main/cpp
          timeout 600 git clone --depth 1 --filter=blob:none --sparse https://github.com/ggml-org/llama.cpp.git
          cd llama.cpp
          git sparse-checkout set --no-cone '/*' '!/.git'
        continue-on-error: true

      - name: Verify llama.cpp checkout
        run: |
          ls -la app/src/main/cpp/
          if [ -d app/src/main/cpp/llama.cpp ]; then
            echo "llama.cpp cloned OK"
            ls app/src/main/cpp/llama.cpp/ | head -20
          else
            echo "WARNING: llama.cpp not found, will rely on CMakeLists.txt error messages"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          cd gradle/wrapper
          curl -L https://services.gradle.org/distributions/gradle-8.5-bin.zip -o gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          cp gradle-8.5/lib/gradle-wrapper.jar .
          rm -rf gradle-8.5 gradle-8.5-bin.zip

      - name: Build APK with full debug output
        run: |
          ./gradlew --version
          ./gradlew clean assembleRelease --stacktrace --info

      - name: Check build output
        if: always()
        run: |
          echo "=== Checking for APK ==="
          ls -la app/build/outputs/apk/release/ || echo "No APK directory"
          find app/build -name "*.apk" -type f || echo "No APK files found"

      - name: Upload APK to artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: app/build/
